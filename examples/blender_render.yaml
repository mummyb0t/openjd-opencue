# Simple Blender render job
# Submit with:
#   python openjd_to_opencue.py examples/blender_render.yaml \
#       --show myshow --shot sh010 --dry-run

specificationVersion: jobtemplate-2023-09
name: "Blender_Render_{{Param.ShotName}}"

parameterDefinitions:
  - name: SceneFile
    type: PATH
    default: /scenes/shot010.blend
  - name: OutputDir
    type: PATH
    default: /renders/shot010
  - name: ShotName
    type: STRING
    default: shot010
  - name: FrameStart
    type: INT
    default: 1
  - name: FrameEnd
    type: INT
    default: 100

steps:
  - name: Render
    parameterSpace:
      taskParameterDefinitions:
        - name: Frame
          type: INT
          range: "{{Param.FrameStart}}-{{Param.FrameEnd}}"
    hostRequirements:
      amounts:
        - name: amount.worker.vcpu
          min: 4
        - name: amount.worker.memory
          min: 8192
    script:
      actions:
        onRun:
          command: blender
          args:
            - "-b"
            - "{{Param.SceneFile}}"
            - "-o"
            - "{{Param.OutputDir}}/render_####.exr"
            - "-f"
            - "{{Task.Param.Frame}}"
