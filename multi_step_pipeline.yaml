# Multi-step VFX pipeline: Render → Denoise → Composite → Dailies MOV
# Demonstrates step dependencies, resource requirements, and chunking.
#
# Submit with:
#   python openjd_to_opencue.py examples/multi_step_pipeline.yaml \
#       --show feature_film --shot sh030 --dry-run

specificationVersion: jobtemplate-2023-09
name: "Pipeline_{{Param.ShotName}}_v{{Param.Version}}"

parameterDefinitions:
  - name: ShotName
    type: STRING
    default: sh030
  - name: Version
    type: STRING
    default: "003"
  - name: SceneFile
    type: PATH
    default: /projects/film/scenes/sh030_v003.blend
  - name: OutputRoot
    type: PATH
    default: /projects/film/renders/sh030
  - name: CompScript
    type: PATH
    default: /projects/film/nuke/sh030_comp_v003.nk
  - name: FrameStart
    type: INT
    default: 1001
  - name: FrameEnd
    type: INT
    default: 1120

steps:
  # ── Step 1: Main render (heavy, needs GPU) ──
  - name: Render
    parameterSpace:
      taskParameterDefinitions:
        - name: Frame
          type: INT
          range: "{{Param.FrameStart}}-{{Param.FrameEnd}}"
    hostRequirements:
      amounts:
        - name: amount.worker.vcpu
          min: 8
        - name: amount.worker.memory
          min: 16384
      attributes:
        - name: attr.worker.os.family
          anyOf: ["linux"]
    script:
      actions:
        onRun:
          command: blender
          args:
            - "-b"
            - "{{Param.SceneFile}}"
            - "-o"
            - "{{Param.OutputRoot}}/render/v{{Param.Version}}/render_######.exr"
            - "-f"
            - "{{Task.Param.Frame}}"

  # ── Step 2: Denoise (depends on render) ──
  - name: Denoise
    dependencies:
      - dependsOn: Render
    parameterSpace:
      taskParameterDefinitions:
        - name: Frame
          type: INT
          range: "{{Param.FrameStart}}-{{Param.FrameEnd}}"
    hostRequirements:
      amounts:
        - name: amount.worker.vcpu
          min: 4
        - name: amount.worker.memory
          min: 8192
    script:
      actions:
        onRun:
          command: python
          args:
            - "/tools/denoise/denoise_frame.py"
            - "--input"
            - "{{Param.OutputRoot}}/render/v{{Param.Version}}/render_{{Task.Param.Frame}}.exr"
            - "--output"
            - "{{Param.OutputRoot}}/denoise/v{{Param.Version}}/denoise_{{Task.Param.Frame}}.exr"
            - "--strength"
            - "0.5"

  # ── Step 3: Nuke composite (depends on denoise) ──
  - name: Composite
    dependencies:
      - dependsOn: Denoise
    parameterSpace:
      taskParameterDefinitions:
        - name: Frame
          type: INT
          range: "{{Param.FrameStart}}-{{Param.FrameEnd}}"
    hostRequirements:
      amounts:
        - name: amount.worker.vcpu
          min: 4
        - name: amount.worker.memory
          min: 12288
    script:
      actions:
        onRun:
          command: nuke
          args:
            - "-x"
            - "{{Param.CompScript}}"
            - "-F"
            - "{{Task.Param.Frame}}-{{Task.Param.Frame}}"

  # ── Step 4: Generate dailies MOV (depends on composite, single task) ──
  - name: Dailies
    dependencies:
      - dependsOn: Composite
    hostRequirements:
      amounts:
        - name: amount.worker.vcpu
          min: 2
        - name: amount.worker.memory
          min: 4096
    script:
      actions:
        onRun:
          command: ffmpeg
          args:
            - "-y"
            - "-start_number"
            - "{{Param.FrameStart}}"
            - "-i"
            - "{{Param.OutputRoot}}/comp/v{{Param.Version}}/comp_%06d.exr"
            - "-c:v"
            - "libx264"
            - "-pix_fmt"
            - "yuv420p"
            - "{{Param.OutputRoot}}/dailies/{{Param.ShotName}}_v{{Param.Version}}.mov"
